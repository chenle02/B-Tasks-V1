<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>B-Tasks V1</title><style>body{margin:0;background:#07131e;color:white;font-family:system-ui}.app{min-height:100vh;padding:16px;background:radial-gradient(circle at top,#174569,#07131e 45%,#04070c)}h1{margin:0}.sub{color:#a8c7d9}.box{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:12px;margin:10px 0}input,select,textarea{width:100%;padding:11px;margin:5px 0;border-radius:14px;border:1px solid #36566a;background:#132838;color:white;font-size:15px}button{border:0;border-radius:999px;background:#0b84ff;color:white;font-weight:900;padding:10px 12px;margin:3px}.danger{background:#d64242}.good{background:#14a46d}.star{background:#f59e0b}.tabs{display:flex;gap:5px;overflow:auto}.on{background:#50a3ff}.task{background:rgba(255,255,255,.08);border-radius:18px;padding:12px;margin:10px 0}.done{opacity:.55;text-decoration:line-through}.meta{color:#a8c7d9;font-size:12px}.bar{position:fixed;left:8px;right:8px;bottom:8px;display:flex;gap:5px;overflow:auto}.list{padding-bottom:82px}</style></head><body><div class="app"><h1>B-Tasks V1</h1><div id="sum" class="sub">Tasks</div><div class="box"><input id="title" placeholder="New task title"><select id="priority"><option>Normal</option><option>High</option><option>Low</option></select><input id="due" type="date"><textarea id="note" placeholder="Notes"></textarea><button onclick="addTask()">+ Add Task</button></div><div class="box"><input id="search" placeholder="Search tasks" oninput="render()"><div class="tabs"><button id="all" class="on" onclick="setF('all')">All</button><button id="today" onclick="setF('today')">Today</button><button id="open" onclick="setF('open')">Open</button><button id="done" onclick="setF('done')">Done</button><button id="high" onclick="setF('high')">High</button></div></div><div id="list" class="list"></div><div class="bar"><button onclick="addTask()">Add</button><button class="good" onclick="allDone()">All Done</button><button class="danger" onclick="clearDone()">Clear Done</button><button onclick="openLauncher()">B-Launcher</button><button onclick="openNotes()">B-Notes</button></div></div><script>let tasks=[];let f='all';try{tasks=JSON.parse(localStorage.getItem('btasks_tasks')||'[]')}catch(e){}function save(){localStorage.setItem('btasks_tasks',JSON.stringify(tasks))}function uid(){return't'+Date.now()+Math.floor(Math.random()*999)}function today(){return new Date().toISOString().slice(0,10)}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function addTask(){let title=document.getElementById('title').value.trim();if(!title){alert('Type a task title first.');return}tasks.unshift({id:uid(),title:title,priority:priority.value,due:due.value,note:note.value,done:false,created:new Date().toISOString()});document.getElementById('title').value='';note.value='';save();render()}function setF(x){f=x;document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));document.getElementById(x).classList.add('on');render()}function toggle(id){let t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();render()}}function del(id){tasks=tasks.filter(x=>x.id!==id);save();render()}function edit(id){let t=tasks.find(x=>x.id===id);if(!t)return;let v=prompt('Edit task',t.title);if(v&&v.trim()){t.title=v.trim();save();render()}}function arr(){let q=search.value.toLowerCase();return tasks.filter(t=>(!q||(t.title+' '+t.note+' '+t.priority+' '+t.due).toLowerCase().includes(q))&&(f==='all'||(f==='today'&&t.due===today())||(f==='open'&&!t.done)||(f==='done'&&t.done)||(f==='high'&&t.priority==='High')))}function render(){let l=list;l.innerHTML='';sum.textContent=tasks.filter(t=>!t.done).length+' open / '+tasks.length+' total';let a=arr();if(!a.length){l.innerHTML='<div class="box sub">No tasks found.</div>';return}a.forEach(t=>{let d=document.createElement('div');d.className='task '+(t.done?'done':'');d.innerHTML='<b>'+esc(t.title)+'</b><div class=meta>'+esc(t.priority)+' · '+(t.due||'No due date')+'</div><div class=meta>'+esc(t.note)+'</div><button onclick="toggle(\''+t.id+'\')">'+(t.done?'✓':'○')+'</button><button onclick="edit(\''+t.id+'\')">Edit</button><button class=danger onclick="del(\''+t.id+'\')">Delete</button>';l.appendChild(d)})}function allDone(){tasks.forEach(t=>t.done=true);save();render()}function clearDone(){tasks=tasks.filter(t=>!t.done);save();render()}function openApp(p,c,n){try{AndroidBridge.openApp(p,c,n)}catch(e){}}function openLauncher(){openApp('com.chenboda01.blauncherv1','com.chenboda01.blauncherv1.MainActivity','B-Launcher V1')}function openNotes(){openApp('com.chenboda01.bnotesv1','com.chenboda01.bnotesv1.MainActivity','B-Notes V1')}window.btasksBack=function(){search.value='';setF('all')};render();</script></body></html>
